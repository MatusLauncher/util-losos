stages:
  - check
  - test

# ── fmt ────────────────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:slim
  script:
    - rustup component add rustfmt
    - cargo fmt
    - git config user.email "ci@gitlab"
    - git config user.name "GitLab CI"
    - 'git diff --quiet || git commit -am "style: cargo fmt [ci skip]"'
    - 'git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}'

# ── clippy ─────────────────────────────────────────────────────────────────────

clippy:
  stage: check
  image: rust:slim
  script:
    - rustup component add clippy
    - cargo clippy -- -W clippy::all -W clippy::perf

# ── test ───────────────────────────────────────────────────────────────────────

test:
  stage: test
  image: rust:slim
  script:
    - cargo test

# ── bench ──────────────────────────────────────────────────────────────────────

bench:
  stage: test
  image: rust:slim
  script:
    - cargo bench
