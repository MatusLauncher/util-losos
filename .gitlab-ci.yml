stages:
  - check
  - test

# ── fmt ────────────────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:slim
  script:
    - rustup component add rustfmt
    - cargo fmt --check

# ── clippy ─────────────────────────────────────────────────────────────────────

clippy:
  stage: check
  image: rust:slim
  script:
    - rustup component add clippy
    - cargo clippy -- -W clippy::all -W clippy::perf

# ── test ───────────────────────────────────────────────────────────────────────

test:
  stage: test
  image: rust:slim
  script:
    - cargo test

# ── bench ──────────────────────────────────────────────────────────────────────

bench:
  stage: test
  image: rust:slim
  script:
    - cargo bench
