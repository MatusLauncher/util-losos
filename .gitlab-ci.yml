variables:
  GIT_SUBMODULE_STRATEGY: recursive
  # ccache and Cargo inside the project dir so GitLab's cache can snapshot them.
  CCACHE_DIR: "$CI_PROJECT_DIR/.ccache"
  CCACHE_COMPILERCHECK: content
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TERM_COLOR: always

stages:
  - check
  - test
  - build-docs
  - build-iso
  - deploy

# ── shared ─────────────────────────────────────────────────────────────────────

.rust_with_sys_deps:
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends pkg-config libudev-dev libclang-dev

.cargo_cache:
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - .cargo/git/db
      - target

# ── fmt ────────────────────────────────────────────────────────────────────────

fmt:
  extends: .cargo_cache
  stage: check
  image: rust:slim
  script:
    - rustup component add rustfmt
    - cargo fmt --check

# ── clippy ─────────────────────────────────────────────────────────────────────

clippy:
  extends:
    - .rust_with_sys_deps
    - .cargo_cache
  stage: check
  image: rust:slim
  script:
    - rustup component add clippy
    - cargo clippy -- -W clippy::all -W clippy::perf

# ── test ───────────────────────────────────────────────────────────────────────

test:
  extends:
    - .rust_with_sys_deps
    - .cargo_cache
  stage: test
  image: rust:slim
  script:
    - cargo test

# ── bench ──────────────────────────────────────────────────────────────────────

bench:
  extends:
    - .rust_with_sys_deps
    - .cargo_cache
  stage: test
  image: rust:slim
  script:
    - cargo bench

# ── docs build ─────────────────────────────────────────────────────────────────

docs:
  stage: build-docs
  image: rustlang/mdbook
  script:
    - mdbook build book
  artifacts:
    paths:
      - book/html
    expire_in: 1 week
  rules:
    - changes:
        - book/**/*
      when: always

# ── pages ──────────────────────────────────────────────────────────────────────

pages:
  stage: deploy
  image: rustlang/mdbook
  script:
    - mdbook build book
    - mkdir -p public
    - cp -r book/html/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── OS ISO build ───────────────────────────────────────────────────────────────

build-iso:
  stage: build-iso
  image: ubuntu:24.04
  cache:
    # LLVM binary — rebuild when Justfile changes (recipe drives the build).
    - key:
        files: [Justfile]
        prefix: llvm
      paths: [llvm/]
      policy: pull-push
    # ccache for LLVM C++ compilation objects (host-side bootstrap + stage2).
    - key: "ccache-llvm-$CI_RUNNER_EXECUTABLE_ARCH"
      fallback_keys: ["ccache-llvm"]
      paths: [.ccache/]
      policy: pull-push
    # ccache for kernel C compilation objects (inside the build container).
    - key: "ccache-kernel-$CI_RUNNER_EXECUTABLE_ARCH"
      fallback_keys: ["ccache-kernel"]
      paths: [.build-cache/ccache-kernel/]
      policy: pull-push
    # Kernel source tarballs — keyed by arch only so they survive kernel version
    # bumps as a fallback (tarball name encodes the tag; stale ones are ignored).
    - key: "kernel-tarballs-$CI_RUNNER_EXECUTABLE_ARCH"
      paths: [.build-cache/tarballs/]
      policy: pull-push
    # Pre-built isoman binary — keyed on the files that affect its compilation.
    - key:
        files: [Containerfile.isoman, crates/isoman/Cargo.lock]
        prefix: isoman-bin
      paths: [.build-cache/isoman]
      policy: pull-push
    # Cargo registry and installed binaries (just, isoman, etc.).
    - key:
        files: ["**/Cargo.lock"]
        prefix: cargo-iso
      paths: [.cargo/]
      policy: pull-push
  before_script:
    # Add GitHub CLI apt repo (curl is pre-installed in ubuntu:24.04).
    # gh is used in after_script to sync newly-generated SB keys to GitHub Secrets.
    - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg
        -o /usr/share/keyrings/githubcli-archive-keyring.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        > /etc/apt/sources.list.d/github-cli.list
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        cmake ninja-build mold clang lld curl ca-certificates
        ccache
        podman
        musl-tools
        libssl-dev libelf-dev
        python3 perl flex bison bc
        sbsigntool
        gh
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs
        | sh -s -- -y --default-toolchain stable
            --target x86_64-unknown-linux-musl
            --no-modify-path
    - source "$CARGO_HOME/env"
    - command -v just || cargo install just --locked
    - ccache --max-size=5G
    # Restore Secure Boot keys from CI variables when present.
    # On the very first run these variables are empty and just build will
    # generate the keys via _ensure-sb-keys → setup-sbctl.
    # Bootstrap: set GL_SECRETS_TOKEN (api scope), GH_SECRETS_PAT (secrets:write),
    # and GH_REPO (owner/repo) as masked CI variables once; after_script does the rest.
    - |
      if [[ -n "${SB_KEY_PEM:-}" && -n "${SB_CERT_PEM:-}" ]]; then
        printf '%s' "$SB_KEY_PEM"  | base64 -d > sb-key.pem
        printf '%s' "$SB_CERT_PEM" | base64 -d > sb-cert.pem
        chmod 600 sb-key.pem
        echo "==> Restored Secure Boot keys from CI variables."
      else
        echo "==> SB_KEY_PEM/SB_CERT_PEM not set — keys will be generated by just build."
      fi
  script:
    - just build
    - ccache --show-stats
    - ccache --dir .build-cache/ccache-kernel --show-stats
  # Runs even on failure so keys generated mid-build are never lost.
  after_script:
    - |
      # Only act when keys were absent at job start (SB_KEY_PEM empty) but are
      # now present on disk (generated by just build / _ensure-sb-keys).
      if [[ -n "${SB_KEY_PEM:-}" || ! -f sb-key.pem || ! -f sb-cert.pem ]]; then
        exit 0
      fi
      echo "==> Persisting newly-generated Secure Boot keys to secret stores..."
      key_b64=$(base64 -w0 sb-key.pem)
      cert_b64=$(base64 -w0 sb-cert.pem)

      # ── GitLab CI Variables ────────────────────────────────────────────────
      if [[ -n "${GL_SECRETS_TOKEN:-}" ]]; then
        _api="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/variables"
        _gl_store() {
          # Try create (POST); if variable already exists fall back to update (PUT).
          curl -sf -X POST \
            -H "PRIVATE-TOKEN: $GL_SECRETS_TOKEN" \
            -F "key=$1" -F "value=$2" -F "masked=$3" -F "protected=false" \
            "$_api" 2>/dev/null \
          || curl -sf -X PUT \
            -H "PRIVATE-TOKEN: $GL_SECRETS_TOKEN" \
            -F "value=$2" -F "masked=$3" \
            "$_api/$1" 2>/dev/null
        }
        _gl_store SB_KEY_PEM  "$key_b64"  true  \
          && echo "  [GL] SB_KEY_PEM  stored" \
          || echo "  [GL] SB_KEY_PEM  FAILED — check GL_SECRETS_TOKEN has api scope"
        _gl_store SB_CERT_PEM "$cert_b64" false \
          && echo "  [GL] SB_CERT_PEM stored" \
          || echo "  [GL] SB_CERT_PEM FAILED"
      else
        echo "  [GL] GL_SECRETS_TOKEN not set — skipping GitLab variable persistence."
      fi

      # ── GitHub Secrets ────────────────────────────────────────────────────
      if [[ -n "${GH_SECRETS_PAT:-}" && -n "${GH_REPO:-}" ]]; then
        GH_TOKEN="$GH_SECRETS_PAT" gh secret set SB_KEY_PEM  \
          --body "$key_b64"  --repo "$GH_REPO" \
          && echo "  [GH] SB_KEY_PEM  stored" \
          || echo "  [GH] SB_KEY_PEM  FAILED — check GH_SECRETS_PAT has secrets:write"
        GH_TOKEN="$GH_SECRETS_PAT" gh secret set SB_CERT_PEM \
          --body "$cert_b64" --repo "$GH_REPO" \
          && echo "  [GH] SB_CERT_PEM stored" \
          || echo "  [GH] SB_CERT_PEM FAILED"
      else
        echo "  [GH] GH_SECRETS_PAT or GH_REPO not set — skipping GitHub secret persistence."
      fi
      echo "==> Done. Set GL_SECRETS_TOKEN / GH_SECRETS_PAT / GH_REPO to enable auto-sync."
  artifacts:
    paths: [os-client.iso]
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
