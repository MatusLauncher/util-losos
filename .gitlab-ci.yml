variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - check
  - test
  - deploy

# ── shared ─────────────────────────────────────────────────────────────────────

.rust_with_sys_deps:
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends pkg-config libudev-dev libclang-dev

# ── fmt ────────────────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:slim
  script:
    - rustup component add rustfmt
    - cargo fmt --check

# ── clippy ─────────────────────────────────────────────────────────────────────

clippy:
  extends: .rust_with_sys_deps
  stage: check
  image: rust:slim
  script:
    - rustup component add clippy
    - cargo clippy -- -W clippy::all -W clippy::perf

# ── test ───────────────────────────────────────────────────────────────────────

test:
  extends: .rust_with_sys_deps
  stage: test
  image: rust:slim
  script:
    - cargo test

# ── bench ──────────────────────────────────────────────────────────────────────

bench:
  extends: .rust_with_sys_deps
  stage: test
  image: rust:slim
  script:
    - cargo bench

# ── pages ──────────────────────────────────────────────────────────────────────

pages:
  extends: .rust_with_sys_deps
  stage: deploy
  image: rust:slim
  variables:
    CARGO_TARGET_DIR: target
  script:
    - |
      CRATES="
      actman|crates/actman/Cargo.toml|init system (PID 1)
      updman|crates/updman/Cargo.toml|update manager
      pakman|crates/pakman/Cargo.toml|package manager
      cluman|crates/cluman/Cargo.toml|cluster manager
      dhcman|crates/dhcman/Cargo.toml|DHCP manager
      isoman|crates/isoman/Cargo.toml|ISO manager
      testman|crates/testman/Cargo.toml|integration test runner
      userman|crates/user/crates/userman/Cargo.toml|user management
      perman|crates/user/crates/perman/Cargo.toml|permission enforcement
      "

      # Build docs for each crate
      echo "$CRATES" | while IFS='|' read -r name manifest desc; do
        [ -z "$name" ] && continue
        cargo doc --no-deps --manifest-path "$manifest"
      done

      # Bench workspace docs
      cargo doc --no-deps
      mv target/doc public

      # Generate root index page
      cat > public/index.html <<'HEADER'
      <!DOCTYPE html>
      <html>
        <head>
          <meta charset="utf-8">
          <title>util-mdl — crate docs</title>
          <style>
            body { font-family: sans-serif; max-width: 640px; margin: 4rem auto; }
            h1   { font-size: 1.4rem; }
            ul   { line-height: 2; }
          </style>
        </head>
        <body>
          <h1>util-mdl — API documentation</h1>
          <ul>
      HEADER

      echo "$CRATES" | while IFS='|' read -r name manifest desc; do
        [ -z "$name" ] && continue
        echo "        <li><a href=\"${name}/index.html\">${name}</a> — ${desc}</li>" >> public/index.html
      done

      cat >> public/index.html <<'FOOTER'
          </ul>
        </body>
      </html>
      FOOTER
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
