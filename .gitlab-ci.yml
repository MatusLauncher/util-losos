variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - check
  - test
  - build-docs
  - deploy

# ── shared ─────────────────────────────────────────────────────────────────────

.rust_with_sys_deps:
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends pkg-config libudev-dev libclang-dev

.cargo_cache:
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - ~/.cargo/registry/index
      - ~/.cargo/registry/cache
      - ~/.cargo/git/db
      - target

# ── fmt ────────────────────────────────────────────────────────────────────────

fmt:
  extends: .cargo_cache
  stage: check
  image: rust:slim
  script:
    - rustup component add rustfmt
    - cargo fmt --check

# ── clippy ─────────────────────────────────────────────────────────────────────

clippy:
  extends:
    - .rust_with_sys_deps
    - .cargo_cache
  stage: check
  image: rust:slim
  script:
    - rustup component add clippy
    - cargo clippy -- -W clippy::all -W clippy::perf

# ── test ───────────────────────────────────────────────────────────────────────

test:
  extends:
    - .rust_with_sys_deps
    - .cargo_cache
  stage: test
  image: rust:slim
  script:
    - cargo test

# ── bench ──────────────────────────────────────────────────────────────────────

bench:
  extends:
    - .rust_with_sys_deps
    - .cargo_cache
  stage: test
  image: rust:slim
  script:
    - cargo bench

# ── docs build ─────────────────────────────────────────────────────────────────

docs:
  stage: build-docs
  image: node:22-alpine
  cache:
    key:
      files:
        - book/package.json
    paths:
      - book/node_modules
  script:
    - cd book
    - corepack enable
    - bun install
    - bun run build
  artifacts:
    paths:
      - book/build
    expire_in: 1 week
  rules:
    - changes:
        - book/**/*
      when: always

# ── pages ──────────────────────────────────────────────────────────────────────

pages:
  stage: deploy
  image: node:22-alpine
  cache:
    key:
      files:
        - book/package.json
    paths:
      - book/node_modules
  script:
    - cd book
    - corepack enable
    - bun install
    - bun run build
    - mv build ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
