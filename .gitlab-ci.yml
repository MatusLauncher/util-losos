stages:
  - build
  - test
  - publish

variables:
  INITRAMFS: os.initramfs.tar.gz
  # Full image ref, e.g. registry.gitlab.com/mtos-v2/util-mdl:main
  IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ── Build ──────────────────────────────────────────────────────────────────────

build-initramfs:
  stage: build
  image: quay.io/podman/stable
  variables:
    # Allow podman to run unprivileged inside the GitLab runner container.
    STORAGE_DRIVER: vfs
  before_script:
    - podman info
  script:
    - podman build --no-cache -t util-mdl-build .
    - podman create --name util-mdl-export util-mdl-build
    - podman cp util-mdl-export:/$INITRAMFS $INITRAMFS
    - podman rm util-mdl-export
  artifacts:
    name: initramfs
    paths:
      - $INITRAMFS
    expire_in: 1 day

# ── Test ───────────────────────────────────────────────────────────────────────
#
# Requires a GitLab runner with:
#   - qemu-system-x86_64 installed on the host
#   - a kernel image available at $KERNEL
#   - nested virtualisation enabled for KVM (or set KVM=0 for slow software emulation)
#
# Mark as manual on shared runners that lack QEMU; remove `when: manual` on
# dedicated bare-metal runners.

test-boot:
  stage: test
  needs: [build-initramfs]
  # Install Rust toolchain and QEMU on the runner host, or use a custom image
  # that has both pre-installed.
  image: rust:slim
  variables:
    KVM: "0"
    MEMORY: "512M"
    CPUS: "1"
  before_script:
    - apt-get update -qq && apt-get install -y -qq qemu-system-x86 2>/dev/null
    - |
      if [ -z "$KERNEL" ]; then
        # Use the runner host kernel as a fallback; may not match the initramfs ABI.
        KERNEL=$(ls /boot/vmlinuz-* 2>/dev/null | head -n1)
        echo "KERNEL not set, using: $KERNEL"
      fi
    - cargo build -p testman
  script:
    - |
      KERNEL="$KERNEL" \
      INITRAMFS="$INITRAMFS" \
      MEMORY="$MEMORY" \
      CPUS="$CPUS" \
      KVM="$KVM" \
      cargo run -p testman
  when: manual
  allow_failure: false

# ── Publish ────────────────────────────────────────────────────────────────────
#
# Pushes the scratch image (containing os.initramfs.tar.gz) to the GitLab
# container registry.  The image itself IS the delivery artifact — pull it and
# copy /os.initramfs.tar.gz out to deploy.
#
# Tagged as:
#   <registry>/<project>:<branch-slug>   — for every branch
#   <registry>/<project>:latest          — only on the default branch

publish:
  stage: publish
  needs: [build-initramfs]
  image: quay.io/podman/stable
  variables:
    STORAGE_DRIVER: vfs
  before_script:
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - podman build --no-cache -t "$IMAGE" .
    - podman push "$IMAGE"
    - |
      if [ "$CI_COMMIT_REF_NAME" = "$CI_DEFAULT_BRANCH" ]; then
        podman tag "$IMAGE" "$IMAGE_LATEST"
        podman push "$IMAGE_LATEST"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
