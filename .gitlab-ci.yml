variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - check
  - test
  - deploy

# ── shared ─────────────────────────────────────────────────────────────────────

.rust_with_sys_deps:
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends pkg-config libudev-dev libclang-dev

# ── fmt ────────────────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:slim
  script:
    - rustup component add rustfmt
    - cargo fmt --check

# ── clippy ─────────────────────────────────────────────────────────────────────

clippy:
  extends: .rust_with_sys_deps
  stage: check
  image: rust:slim
  script:
    - rustup component add clippy
    - cargo clippy -- -W clippy::all -W clippy::perf

# ── test ───────────────────────────────────────────────────────────────────────

test:
  extends: .rust_with_sys_deps
  stage: test
  image: rust:slim
  script:
    - cargo test

# ── bench ──────────────────────────────────────────────────────────────────────

bench:
  extends: .rust_with_sys_deps
  stage: test
  image: rust:slim
  script:
    - cargo bench

# ── pages ──────────────────────────────────────────────────────────────────────

pages:
  extends: .rust_with_sys_deps
  stage: deploy
  image: rust:slim
  variables:
    CARGO_TARGET_DIR: target
  script:
    # Build docs for each submodule individually
    - for crate in actman updman pakman cluman isoman dhcman testman; do
        cargo doc --no-deps --manifest-path "crates/$crate/Cargo.toml";
      done
    - cargo doc --no-deps --manifest-path crates/user/crates/userman/Cargo.toml
    - cargo doc --no-deps --manifest-path crates/user/crates/perman/Cargo.toml
    # Bench workspace docs
    - cargo doc --no-deps
    - mv target/doc public
    # Root index page
    - |
      cat > public/index.html <<'EOF'
      <!DOCTYPE html>
      <html>
        <head>
          <meta charset="utf-8">
          <title>util-mdl — crate docs</title>
          <style>
            body { font-family: sans-serif; max-width: 640px; margin: 4rem auto; }
            h1   { font-size: 1.4rem; }
            ul   { line-height: 2; }
          </style>
        </head>
        <body>
          <h1>util-mdl — API documentation</h1>
          <ul>
            <li><a href="actman/index.html">actman</a> — init system (PID 1)</li>
            <li><a href="updman/index.html">updman</a> — update manager</li>
            <li><a href="pakman/index.html">pakman</a> — package manager</li>
            <li><a href="cluman/index.html">cluman</a> — cluster manager</li>
            <li><a href="dhcman/index.html">dhcman</a> — DHCP manager</li>
            <li><a href="isoman/index.html">isoman</a> — ISO manager</li>
            <li><a href="testman/index.html">testman</a> — integration test runner</li>
            <li><a href="userman/index.html">userman</a> — user management</li>
            <li><a href="perman/index.html">perman</a> — permission enforcement</li>
          </ul>
        </body>
      </html>
      EOF
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
