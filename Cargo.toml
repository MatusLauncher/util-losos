[workspace]
resolver = "3"
members = ["crates/actman", "crates/updman", "crates/dhcman", "crates/testman", "crates/isoman"]

[workspace.dependencies]
miette = {version = "*", features = ["fancy"]}
tracing = "*"
tracing-subscriber = "*"
walkdir = "*"

[profile.release]
lto = true
codegen-units = 1
strip = true