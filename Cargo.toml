[workspace]
resolver = "3"
members = ["crates/bench"]

[workspace.dependencies]
actman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/actman" }
cluman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/cluman" }
dhcman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/dhcman" }
updman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/updman" }
pakman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/pakman" }
isoman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/isoman" }
mkbootimg = { git = "https://gitlab.com/mtos-v2/mkbootimg" }
rustix = { version = "1.1.4", features = ["system", "mount", "process"] }
serde_json = "1.0.149"
tempfile = "3"
walkdir = "*"

[profile.release]
lto = true
codegen-units = 1
strip = true

[profile.dev]
codegen-units = 16
