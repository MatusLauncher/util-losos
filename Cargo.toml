[workspace]
resolver = "3"
members = ["crates/actman", "crates/updman", "crates/dhcman", "crates/testman", "crates/isoman", "crates/cluman", "crates/bench"]

[workspace.dependencies]
miette = {version = "*", features = ["fancy"]}
tracing = "*"
tracing-subscriber = "*"
walkdir = "*"
criterion = { version = "0.8.2", features = ["html_reports"] }
fastrand = "2"

[profile.release]
lto = true
codegen-units = 1
strip = true
