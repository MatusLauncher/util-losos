[workspace]
resolver = "3"
members = ["crates/bench"]
exclude = [
    "crates/actman",
    "crates/updman",
    "crates/pakman",
    "crates/cluman",
    "crates/isoman",
    "crates/dhcman",
    "crates/testman",
    "crates/user",
    "crates/gpuman",
]

[workspace.dependencies]
actman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/actman" }
cluman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/cluman" }
dhcman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/dhcman" }
updman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/updman" }
pakman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/pakman" }
isoman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/isoman" }
gpuman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/gpuman", branch = "master" }
mkbootimg = { git = "https://gitlab.com/mtos-v2/mkbootimg" }
base64 = "0.22.1"
russh-keys = "0.49"
rustix = { version = "1.1.4", features = ["system", "mount", "process"] }
serde_json = "1.0.149"
ssh-key = { version = "0.6", features = ["ed25519", "rand_core"] }
tempfile = "3"
totp-rs = { version = "5", features = ["otpauth"] }
ureq = { version = "3", features = ["json"] }
userman = { version = "0.1.0", git = "https://gitlab.com/mtos-v2/userman" }
walkdir = "*"

[patch."https://gitlab.com/mtos-v2/actman"]
actman = { path = "crates/actman" }

[patch."https://gitlab.com/mtos-v2/userman"]
userman = { path = "crates/user/crates/userman" }
perman = { path = "crates/user/crates/perman" }

[patch."https://gitlab.com/mtos-v2/gpuman"]
gpuman = { path = "crates/gpuman" }

[profile.release]
lto = true
codegen-units = 1
strip = true

[profile.dev]
codegen-units = 16
