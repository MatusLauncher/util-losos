[workspace]
resolver = "3"
members = [
            "crates/actman", 
            "crates/updman", 
            "crates/dhcman", 
            "crates/testman", 
            "crates/isoman", 
            "crates/cluman", 
            "crates/bench", 
            "crates/pakman",
            "crates/user/userman",
            "crates/user/perman"
          ]

[workspace.dependencies]
miette = { version = "*", features = ["fancy"] }
tracing = "*"
tracing-subscriber = "*"
walkdir = "*"
fastrand = "2"
clap = { version = "4.6.0", features = ["derive", "env"] }
rustix = { version = "1.1.4", features = ["system", "mount", "process"] }
strum = { version = "0.28.0", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tempfile = "3"
mkbootimg = { git = "https://gitlab.com/mtos-v2/mkbootimg" }
luks = "*"
expressjs = "0.9.2"
tokio = {version = "*", features = ["rt-multi-thread"]}
ureq = {version = "*", features = ["json"]}
overlayfs_fuse = "*"
[profile.release]
lto = true
codegen-units = 1
strip = true

[profile.dev]
codegen-units = 16
