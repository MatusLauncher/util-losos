[package]
name = "bench"
version = "0.1.0"
edition = "2024"
publish = false
autobenches = false

[dev-dependencies]
actman      = { version = "0.1.0", path = "../actman" }
rustix.workspace = true
cluman      = { version = "0.1.0", path = "../cluman" }
dhcman      = { version = "0.1.0", path = "../dhcman" }
updman      = { version = "0.1.0", path = "../updman" }
pakman      = { version = "0.1.0", path = "../pakman" }
serde_json.workspace = true
tempfile.workspace   = true
walkdir.workspace    = true

[[test]]
name = "actman"
path = "benches/actman.rs"

[[test]]
name = "cluman"
path = "benches/cluman.rs"

[[test]]
name = "dhcman"
path = "benches/dhcman.rs"

[[test]]
name = "updman"
path = "benches/updman.rs"

[[test]]
name = "pakman"
path = "benches/pakman.rs"
